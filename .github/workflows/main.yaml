# The name displayed in the GitHub Actions tab
name: UI Test

# Defines the events that trigger this automated process
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs
jobs:
  build-and-test:
    # The type of virtual machine runner the job will execute on
    runs-on: ubuntu-latest

    # The sequential steps to be executed
    steps:
    # 1. Checks out your repository code onto the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Gcc
      run: sudo apt install libgtk-3-dev -y && gcc main.c `pkg-config --cflags --libs gtk+-3.0` -o ui

    # 3. Installs dependencies from your package.json
    - name: Upload
      uses: actions/upload-artifact@v7.0.1
      with:
         name: ui
         path: ./ui
