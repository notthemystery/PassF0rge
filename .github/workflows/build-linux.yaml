name: Build PassF0rge

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Make exploits
        run: |
          cd Exploits/
          rm -rf Windows/
          cd ..

      - name: Make Exploits
        shell: cmd
        run: |
          choco install python3
          pip install pyinstaller
          cd Exploits/Linux/
          pyinstaller --onefile CopyFail.py
          rm -rf build
          rm CopyFail.spec
          mv dist/CopyFail ./
          cd ../../
          
      - name: Compile run.c to DLL
        shell: bash
        run: |
          gcc -shared -o run.so run.c -Wl,--out-implib,librun.a

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create Windows platform
        run: flutter create .

      - name: Build Flutter Windows
        run: flutter build linux --release
        
      - name: Prepare release folder
        shell: bash
        run: |
          mkdir release
          cp build\windows\x64\runner\Release\* release\ /E /I /Y
          cp run.so release\run.so
          cp -r Exploits release\Exploits\ /E /I /Y

      - name: Remove source files from release
        shell: bash
        run: |
          flutter clean

      - name: Create ZIP
        run: |
          zip -r PassF0rge.zip release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PassF0rge
          path: PassF0rge.zip
          archive: false
